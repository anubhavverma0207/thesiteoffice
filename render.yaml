# Render Blueprint for "The Site Office" (static site - always on, free)
# Next.js is exported to ./out and served as static files.
services:
  - type: web
    name: thesiteoffice
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./out
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
